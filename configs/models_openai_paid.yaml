profiles:
  - name: "openai-gpt-5.4-nano"
    # Validated against the official OpenAI API on 2026-04-09.
    # Chat uses max_completion_tokens for this profile. Shared chat reasoning
    # stays disabled via suite defaults; responses tool/custom-tool tests keep
    # explicit reasoning overrides below.
    chat_model: "gpt-5.4-nano"
    responses_model: "gpt-5.4-nano"
    chat_max_tokens_param: "max_completion_tokens"
    reasoning_effort: "low"
    extra: {}
    tests:
      responses.tool_call:
        reasoning_effort: "low"
      responses.tool_call.required:
        reasoning_effort: "low"
      responses.custom_tool:
        reasoning_effort: "low"
      responses.custom_tool.grammar:
        reasoning_effort: "low"

  - name: "openai-gpt-5.4-mini"
    # Validated against the official OpenAI API on 2026-04-09.
    chat_model: "gpt-5.4-mini"
    responses_model: "gpt-5.4-mini"
    chat_max_tokens_param: "max_completion_tokens"
    reasoning_effort: "low"
    extra: {}
