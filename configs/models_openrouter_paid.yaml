profiles:
  - name: "openrouter-gpt5-mini"
    chat_model: "openai/gpt-5-mini"
    responses_model: "openai/gpt-5-mini"
    reasoning_effort: "minimal"
    temperature: 0
    extra: {}

  - name: "openrouter-glm-5"
    chat_model: "z-ai/glm-5"
    responses_model: "z-ai/glm-5"
    temperature: 0
    extra: {}
    tests:
      chat.tool_call:
        max_tokens: 256
      chat.tool_call.required:
        max_tokens: 128
      chat.structured.json_object:
        max_tokens: 384
      chat.structured.json_schema:
        max_tokens: 384
      responses.tool_call.required:
        max_output_tokens: 256

  - name: "openrouter-deepseek-3.2"
    chat_model: "deepseek/deepseek-v3.2"
    responses_model: "deepseek/deepseek-v3.2"
    reasoning_effort: "minimal"
    temperature: 0
    extra: {}

  - name: "openrouter-kimi-k2.5"
    chat_model: "moonshotai/kimi-k2.5"
    responses_model: "moonshotai/kimi-k2.5"
    temperature: 0
    extra: {}
    tests:
      chat.tool_call:
        max_tokens: 96
      chat.tool_call.required:
        max_tokens: 128
      chat.structured.json_object:
        max_tokens: 384
      chat.structured.json_schema:
        max_tokens: 384
      responses.structured.json_object:
        max_output_tokens: 192
      responses.structured.json_schema:
        max_output_tokens: 192

  - name: "openrouter-qwen3.5-397b-a17b"
    chat_model: "qwen/qwen3.5-397b-a17b"
    responses_model: "qwen/qwen3.5-397b-a17b"
    temperature: 0
    extra: {}
    tests:
      chat.tool_call:
        max_tokens: 128
      chat.tool_call.required:
        max_tokens: 128
      chat.structured.json_object:
        max_tokens: 384
      chat.structured.json_schema:
        max_tokens: 384
      responses.structured.json_object:
        max_output_tokens: 192
      responses.structured.json_schema:
        max_output_tokens: 192
