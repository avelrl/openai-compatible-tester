# Curated defaults as of 2026-03-13.
# Edit this file freely as client requirements change.

targets:
  - id: codex-cli
    name: Codex CLI
    category: coding_agent
    docs_url: "https://developers.openai.com/codex/config-reference/"
    notes:
      - "Custom providers in Codex use the Responses API."
      - "Codex may rely on non-function Responses tool types; function-only tool validation is not sufficient."
    modes:
      - name: responses
        api: responses
        verified_on: "2026-03-13"
        source: "official_docs"
        confidence: "high"
        required_tests:
          - responses.basic
          - responses.stream
          - responses.tool_call.required
          - responses.custom_tool
        optional_tests:
          - responses.custom_tool.grammar
          - responses.structured.json_schema
          - responses.error_shape
        unsupported_ok:
          - responses.memory.prev_id
          - responses.store_get
          - responses.conversations

  - id: qwen-code
    name: Qwen Code
    category: coding_agent
