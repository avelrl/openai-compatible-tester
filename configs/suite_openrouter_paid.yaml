passes: 1
warmup_passes: 0
parallelism: 1
timeout_seconds: 60
litellm_headers: {}
retry:
  max_attempts: 2
  backoff_ms: 250
  rate_limit_max_attempts: 2
  rate_limit_fallback_ms: 5000
  retry_on_status: [429, 500, 502, 503, 504]
  test_retries: 0
stream:
  enabled: true
tool_calling:
  enabled: true
structured_outputs:
  enabled: true
conversations:
  enabled: false
memory:
  enabled: false
chat_reasoning:
  enabled: true
tests:
  responses.memory.prev_id:
    enabled: false
    timeout_seconds: 45
    treat_timeout_as_unsupported: true
  responses.conversations:
    enabled: false
    timeout_seconds: 45
    treat_timeout_as_unsupported: true
  responses.store_get:
    enabled: false
  responses.structured.json_schema:
    timeout_seconds: 60
    max_output_tokens: 48
  responses.structured.json_object:
    timeout_seconds: 60
    max_output_tokens: 48
  responses.tool_call:
    timeout_seconds: 60
    stream: false
    stream_timeout_seconds: 30
    tool_choice_mode: forced
    forced_tool_name: add
    parallel_tool_calls: false
    reasoning_effort: minimal
    strict_mode: false
  responses.tool_call.required:
    timeout_seconds: 60
    stream: false
    stream_timeout_seconds: 30
    tool_choice_mode: required
    parallel_tool_calls: false
    reasoning_effort: minimal
    strict_mode: false
  chat.tool_call:
    timeout_seconds: 60
    tool_choice_mode: forced
    forced_tool_name: add
    parallel_tool_calls: false
    max_tokens: 64
    strict_mode: false
  chat.tool_call.required:
    timeout_seconds: 60
    tool_choice_mode: required
    parallel_tool_calls: false
    max_tokens: 64
    strict_mode: false
  chat.structured.json_schema:
    timeout_seconds: 60
    max_tokens: 48
  chat.structured.json_object:
    timeout_seconds: 60
    max_tokens: 48
analysis:
  enabled: true
  compute_percentiles: true
  percentiles: [50, 90, 95]
  flakiness: false
  fail_on_flaky: false
codex_review:
  enabled: false
  codex_bin: "codex"
  model: "gpt-5.4"
  reasoning_effort: "high"
  sandbox: "read-only"
  approvals: "never"
  prompt_template: ""
