name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...
